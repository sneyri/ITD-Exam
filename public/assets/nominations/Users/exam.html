<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экзамен по ИТД</title>
    
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 id="variant-title">Загрузка...</h1>

        <div id="questions-container">Загрузка вопросов...</div>

        <button id="submit-exam-btn" class="btn">Отправить экзамен</button>

        <nav>
            <ul>
                <li><a href="/variants">← Назад к вариантам</a></li>
            </ul>
        </nav>
    </div>

    <div id="result-modal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h2>Ваш результат</h2>
            <p id="result-score" style="font-size: 32px; font-weight: bold; margin: 20px 0;"></p>
            <button id="close-modal-btn" class="btn">Мои результаты</button>
        </div>
    </div>

    <script src="/js/utils/helper.js"></script>
    <script src="/js/pages/exam.js"></script>
    <script src="js/utils/auth-check.js"></script>
</body>

</html>
