<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель | ЕГЭ по ИТД</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Админ панель</h1>
            <div id="adminUserInfo" class="user-greeting"></div>
        </div>

        <div class="admin-container">
            <aside class="admin-sidebar">
                <button class="tab active" data-tab="variants">Варианты</button>
                <button class="tab" data-tab="users">Пользователи</button>
            </aside>

            <main class="admin-content">
                <div id="tab-variants" class="tab-content active">
                    <h2>Управление вариантами</h2>
                    <div class="form-group">
                        <input type="text" id="newVariantTitle" placeholder="Название варианта">
                        <button id="createVariantBtn" class="btn">Создать вариант</button>
                    </div>
                    <table class="variants-table" id="variantsList">
                        <thead>
                            <tr>
                                <th>Название варианта</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="variantsTableBody">
                            <tr>
                                <td colspan="2">Загрузка...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="tab-users" class="tab-content">
                    <h2>Управление пользователями</h2>
                    <div id="usersList">Загрузка...</div>
                </div>
            </main>
        </div>

        <div id="questionsEditor" style="display: none;">
            <div class="modal-overlay"></div>
            <div class="modal-container">
                <div class="modal-header">
                    <h3 id="questionsEditorTitle">Вопросы варианта</h3>
                    <button id="closeQuestionsEditor" class="close-btn">&times;</button>
                </div>
                <div class="modal-body" id="questionsEditorList">
                    Загрузка...
                </div>
            </div>
        </div>

        <nav>
            <ul>
                <li><a href="/">← На главную</a></li>
            </ul>
        </nav>
    </div>

    <script src="/js/utils/helper.js"></script>
    <script src="/js/pages/admin.js"></script>
    <script src="/js/pages/admin-variants.js"></script>
    <script src="/js/pages/admin-users.js"></script>
</body>
</html>
