<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Редактор вопросов</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 id="variantTitle">Вопросы варианта</h1>
        <a href="/admin.html">← Вернуться к вариантам</a>

        <form id="questionForm">
            <input type="text" id="question_text" placeholder="Текст вопроса" required>
            <input type="text" id="correct_answer" placeholder="Правильный ответ" required>
            <input type="number" id="points" placeholder="Баллы" required>
            <button type="submit">Добавить вопрос</button>
        </form>

        <h2>Список вопросов</h2>
        <div id="questionsList">Загрузка...</div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>✏️ Редактировать вопрос</h3>
            <input type="text" id="edit_question_text" placeholder="Текст вопроса">
            <input type="text" id="edit_correct_answer" placeholder="Правильный ответ">
            <input type="number" id="edit_points" placeholder="Баллы">
            <div class="modal-buttons">
                <button id="saveEditBtn" class="save-btn">Сохранить</button>
                <button id="cancelEditBtn" class="cancel-btn">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const URLparams = new URLSearchParams(window.location.search);
        const variantId = URLparams.get('variant_id');

        async function loadVariantTitle() {
            const response = await fetch(`/api/variants/${variantId}`);
            const variant = await response.json();
            const title = document.getElementById('variantTitle');
            title.textContent = `Редактирование варианта ${variant.variant}`;
        }

        if (variantId) {
            loadVariantTitle();
        } else {
            document.getElementById('variantTitle').textContent = 'Ошибка: вариант не выбран';
        }

        let currentEditId = null;

        async function editQuestion(id) {
            currentEditId = id;

            const response = await fetch(`/api/questions/${id}`);
            const q = await response.json();

            document.getElementById('edit_question_text').value = q.question_text;
            document.getElementById('edit_correct_answer').value = q.correct_answer;
            document.getElementById('edit_points').value = q.points;

            document.getElementById('editModal').style.display = 'flex';
        }

        async function saveEdit() {
            const updated = {
                question_text: document.getElementById('edit_question_text').value,
                correct_answer: document.getElementById('edit_correct_answer').value,
                points: parseInt(document.getElementById('edit_points').value),
                variant_id: parseInt(variantId)
            };

            await fetch(`/api/questions/${currentEditId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updated)
            });

            document.getElementById('editModal').style.display = 'none';
            loadQuestions();
        }

        document.getElementById('saveEditBtn').onclick = saveEdit;
        document.getElementById('cancelEditBtn').onclick = () => {
            document.getElementById('editModal').style.display = 'none';
        };

        async function loadQuestions() {
            const container = document.getElementById('questionsList');
            container.innerHTML = 'щащащщаща...';

            const response = await fetch(`/api/questions/variant/${variantId}`);
            const questions = await response.json();

            if (questions.length === 0) {
                container.innerHTML = '<p>Нет вопросов. Добавьте первый!</p>';
                return;
            }

            let html = '<table>';
            html += ' <th>ID</th><th>Текст вопроса</th><th>Ответ</th><th>Баллы</th><th>Действия</th></tr>';

            for (const q of questions) {
                html += `
            <tr>
                <td>${q.id}</td>
                <td>${q.question_text}</td>
                <td>${q.correct_answer}</td>
                <td>${q.points}</td>
                <td>
                    <button onclick="editQuestion(${q.id})">Ред.</button>
                    <button onclick="deleteQuestion(${q.id})">🗑 Удалить</button>
                </td>
            </tr>
        `;
            }
            html += '</table>';
            container.innerHTML = html;
        }

        async function deleteQuestion(id) {
            if (!confirm('Удалить вопрос?')) return;
            await fetch(`/api/questions/${id}`, { method: 'DELETE' });
            loadQuestions();
        }

        document.getElementById('questionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const question_text = document.getElementById('question_text').value;
            const correct_answer = document.getElementById('correct_answer').value;
            const points = document.getElementById('points').value;

            await fetch('/api/questions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question_text,
                    correct_answer,
                    points: parseInt(points),
                    variant_id: parseInt(variantId)
                })
            });

            document.getElementById('questionForm').reset();
            loadQuestions();
        });

        loadQuestions();
    </script>
</body>

</html>
