<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Редактор вопросов</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 id="variantTitle">Вопросы варианта</h1>
        <a href="/admin.html">← Вернуться к вариантам</a>

        <form id="questionForm">
            <input type="text" id="question_text" placeholder="Текст вопроса" required>
            <input type="text" id="correct_answer" placeholder="Правильный ответ" required>
            <input type="number" id="points" placeholder="Баллы" required>
            <button type="submit">Добавить вопрос</button>
        </form>

        <h2>Список вопросов</h2>
        <div id="questionsList">Загрузка...</div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>✏️ Редактировать вопрос</h3>
            <input type="text" id="edit_question_text" placeholder="Текст вопроса">
            <input type="text" id="edit_correct_answer" placeholder="Правильный ответ">
            <input type="number" id="edit_points" placeholder="Баллы">
            <div class="modal-buttons">
                <button id="saveEditBtn" class="save-btn">Сохранить</button>
                <button id="cancelEditBtn" class="cancel-btn">Отмена</button>
            </div>
        </div>
    </div>

    <script src="js/utils/helper.js"></script>
    <script src="js/pages/questions.js"></script>
</body>

</html>
